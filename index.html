<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ip-address-tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
  </head>
  <body>
    <div class="container">
      <div id="header" class="head">
        <div class=title>
          <h3 class="title-ip">IP Address Tracker</h3>
        </div> 
        <div class="search">
          <form class="form-inline">
            <input class="form-control" type="search" placeholder="Search for any IP address or domain">
            <button class="btn-src" type="submit">
              <img src="/public/images/icon-arrow.svg" alt="search">
            </button>
          </form>
        </div>
        <div class="information">
        <div class="articles"> 
          <!-- sağ kısma çizgi ekleyebilmek için class article olarak tanımladık -->
            <div class="ip-add article">
              <h3 class="label">IP ADDRESS</h3>
              <p class="ip-value">hjkhjklhjlvbnhbgfcdxfcgvhbjnkmhhjklj</p>
            </div> 

            <div class="loc article">
              <h3 class="label">LOCATION</h3>
              <p class="loc-value">hjkhjklhjlvbnhbgfcdxfcgvhbjnkmhhjklj</p>
            </div>

            <div class="time-zone article">
              <h3 class="label">TIMEZONE</h3>
              <p class="time-value">hjkhjklhjlvbnhbgfcdxfcgvhbjnkmhhjklj</p>
            </div>

            <div class="isp article">
              <h3 class="label">ISP</h3>
              <p class="isp-value">hjkhjklhjlvbnhbgfcdxfcgvhbjnkmhhjklj</p>
            </div>
        </div>
          
      </div>
    </div>
    <div id="app"></div>
    <div id="map"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>  
  </body>
</html>
